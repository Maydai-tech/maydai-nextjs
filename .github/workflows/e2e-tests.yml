name: E2E Tests

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      preview_url:
        description: 'Preview URL to test manually'
        required: false
        type: string

permissions:
  contents: read
  deployments: read
  pull-requests: read

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.draft == false

    steps:
      - name: Resolve preview context
        id: preview-context
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PREVIEW_URL: ${{ inputs.preview_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$MANUAL_PREVIEW_URL" ]; then
              echo "Manual runs require preview_url." >&2
              exit 1
            fi

            echo "preview_url=$MANUAL_PREVIEW_URL" >> "$GITHUB_OUTPUT"
            echo "pr_number=manual" >> "$GITHUB_OUTPUT"
            echo "pr_title=Manual workflow dispatch" >> "$GITHUB_OUTPUT"
            echo "head_ref=${GITHUB_REF_NAME:-manual}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Waiting for successful Vercel preview deployment for ${PR_HEAD_SHA}..."
          deadline=$((SECONDS + 900))
          preview_url=""

          while [ "$SECONDS" -lt "$deadline" ]; do
            deployments=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/deployments?sha=${PR_HEAD_SHA}&environment=Preview&per_page=20")

            while IFS= read -r deployment_id; do
              [ -n "$deployment_id" ] || continue

              status=$(gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses" \
                --jq '[.[] | select(.state == "success" and ((.environment_url // .target_url // "") != ""))] | first // empty')

              if [ -n "$status" ]; then
                preview_url=$(echo "$status" | jq -r '.environment_url // .target_url')
                break
              fi
            done < <(echo "$deployments" | jq -r '.[].id')

            if [ -n "$preview_url" ]; then
              break
            fi

            echo "Preview deployment not ready yet; retrying in 15 seconds..."
            sleep 15
          done

          if [ -z "$preview_url" ]; then
            echo "No successful Vercel preview deployment found for ${PR_HEAD_SHA} after 15 minutes." >&2
            exit 1
          fi

          {
            echo "preview_url=$preview_url"
            echo "pr_number=$PR_NUMBER"
            echo "pr_title=$PR_TITLE"
            echo "head_ref=$PR_HEAD_REF"
            echo "head_sha=$PR_HEAD_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.preview-context.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e-tests
        continue-on-error: true
        run: |
          # Run tests - reporters configured in playwright.config.ts
          # JSON output goes to test-results.json, HTML to playwright-report/
          npx playwright test
          echo "Tests completed"
        # ==============================================================================
        # WARNING: ARCHITECTURE RULE. The secrets used here MUST point to a STAGING or PREPROD Supabase environment. Since E2E tests bypass the UI and directly inject/delete data via the SERVICE_ROLE_KEY, running this against the real PRODUCTION database will corrupt user data and metrics.
        # ==============================================================================
        env:
          # Supabase config
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Playwright config
          PLAYWRIGHT_BASE_URL: ${{ steps.preview-context.outputs.preview_url }}
          # Optional - for features that need these
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Parse test results
        if: always()
        id: parse-results
        run: |
          # Parse the JSON results file
          if [ -f test-results.json ]; then
            echo "Found test-results.json, parsing..."

            # Count tests by status (handling nested structure)
            PASSED=$(cat test-results.json | jq '[.suites[].suites[]?.specs[]?.tests[]? | select(.status == "expected")] | length' 2>/dev/null || echo "0")
            FAILED=$(cat test-results.json | jq '[.suites[].suites[]?.specs[]?.tests[]? | select(.status == "unexpected")] | length' 2>/dev/null || echo "0")
            SKIPPED=$(cat test-results.json | jq '[.suites[].suites[]?.specs[]?.tests[]? | select(.status == "skipped")] | length' 2>/dev/null || echo "0")
            FLAKY=$(cat test-results.json | jq '[.suites[].suites[]?.specs[]?.tests[]? | select(.status == "flaky")] | length' 2>/dev/null || echo "0")

            # If counts are still 0, try alternative structure (direct specs in suites)
            if [ "$PASSED" = "0" ] && [ "$FAILED" = "0" ] && [ "$SKIPPED" = "0" ]; then
              PASSED=$(cat test-results.json | jq '[.suites[].specs[]?.tests[]? | select(.status == "expected")] | length' 2>/dev/null || echo "0")
              FAILED=$(cat test-results.json | jq '[.suites[].specs[]?.tests[]? | select(.status == "unexpected")] | length' 2>/dev/null || echo "0")
              SKIPPED=$(cat test-results.json | jq '[.suites[].specs[]?.tests[]? | select(.status == "skipped")] | length' 2>/dev/null || echo "0")
              FLAKY=$(cat test-results.json | jq '[.suites[].specs[]?.tests[]? | select(.status == "flaky")] | length' 2>/dev/null || echo "0")
            fi

            # Build test list from nested structure
            TEST_LIST=$(cat test-results.json | jq -r '
              def process_suite:
                .title as $suite |
                (.specs[]? |
                  .title as $spec |
                  .tests[]? |
                  if .status == "expected" then "✅ " + $spec
                  elif .status == "unexpected" then "❌ " + $spec
                  elif .status == "flaky" then "⚠️ " + $spec
                  else "⏭️ " + $spec
                  end
                ),
                (.suites[]? | process_suite);
              .suites[]? | process_suite
            ' 2>/dev/null | head -20 || echo "Could not parse test results")

            # Extract detailed error info for failed tests (for AI analysis)
            # Format: single line per error to avoid JSON issues in Slack payload
            ERROR_DETAILS=$(cat test-results.json | jq -r '
              def get_errors:
                .title as $suite |
                (.specs[]? |
                  .title as $spec |
                  .file as $file |
                  .tests[]? |
                  select(.status == "unexpected") |
                  .results[]? |
                  select(.error) |
                  "• " + $spec + " | " + ($file | split("/") | last) + " | " + ((.error.message // "Unknown error") | gsub("\n"; " ") | gsub("\""; "") | .[0:200])
                ),
                (.suites[]? | get_errors);
              .suites[]? | get_errors
            ' 2>/dev/null | sort -u | head -10 || echo "")

            # If no errors found with nested structure, try flat structure
            if [ -z "$ERROR_DETAILS" ]; then
              ERROR_DETAILS=$(cat test-results.json | jq -r '
                .suites[]?.specs[]? |
                .title as $spec |
                .file as $file |
                .tests[]? |
                select(.status == "unexpected") |
                .results[]? |
                select(.error) |
                "• " + $spec + " | " + ($file | split("/") | last) + " | " + ((.error.message // "Unknown error") | gsub("\n"; " ") | gsub("\""; "") | .[0:200])
              ' 2>/dev/null | sort -u | head -10 || echo "No error details available")
            fi

            # Build a simple summary for copy/paste
            FAILED_TESTS_SUMMARY=$(cat test-results.json | jq -r '
              def get_failed:
                (.specs[]? |
                  .title as $spec |
                  .file as $file |
                  .tests[]? |
                  select(.status == "unexpected") |
                  "• " + $spec + " (" + ($file | split("/") | last) + ")"
                ),
                (.suites[]? | get_failed);
              .suites[]? | get_failed
            ' 2>/dev/null | sort -u | head -15 || echo "")

            if [ -z "$FAILED_TESTS_SUMMARY" ]; then
              FAILED_TESTS_SUMMARY=$(cat test-results.json | jq -r '
                .suites[]?.specs[]? |
                .title as $spec |
                .file as $file |
                .tests[]? |
                select(.status == "unexpected") |
                "• " + $spec + " (" + ($file | split("/") | last) + ")"
              ' 2>/dev/null | sort -u | head -15 || echo "Aucun détail disponible")
            fi

            # Extract failed test files for local run command
            FAILED_FILES=$(cat test-results.json | jq -r '
              def get_failed_files:
                (.specs[]? |
                  .file as $file |
                  .tests[]? |
                  select(.status == "unexpected") |
                  $file
                ),
                (.suites[]? | get_failed_files);
              .suites[]? | get_failed_files
            ' 2>/dev/null | sort -u | tr '\n' ' ' || echo "")

            if [ -z "$FAILED_FILES" ]; then
              FAILED_FILES=$(cat test-results.json | jq -r '
                .suites[]?.specs[]? |
                .file as $file |
                .tests[]? |
                select(.status == "unexpected") |
                $file
              ' 2>/dev/null | sort -u | tr '\n' ' ' || echo "")
            fi

            echo "PASSED=$PASSED" >> $GITHUB_OUTPUT
            echo "FAILED=$FAILED" >> $GITHUB_OUTPUT
            echo "SKIPPED=$SKIPPED" >> $GITHUB_OUTPUT
            echo "FLAKY=$FLAKY" >> $GITHUB_OUTPUT
            echo "TEST_LIST<<EOF" >> $GITHUB_OUTPUT
            echo "$TEST_LIST" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "ERROR_DETAILS<<EOF" >> $GITHUB_OUTPUT
            echo "$ERROR_DETAILS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "FAILED_TESTS_SUMMARY<<EOF" >> $GITHUB_OUTPUT
            echo "$FAILED_TESTS_SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "FAILED_FILES=$FAILED_FILES" >> $GITHUB_OUTPUT

            echo "Parsed: $PASSED passed, $FAILED failed, $SKIPPED skipped, $FLAKY flaky"
          else
            echo "No test-results.json found"
            echo "PASSED=0" >> $GITHUB_OUTPUT
            echo "FAILED=0" >> $GITHUB_OUTPUT
            echo "SKIPPED=0" >> $GITHUB_OUTPUT
            echo "FLAKY=0" >> $GITHUB_OUTPUT
            echo "TEST_LIST=No test results file found" >> $GITHUB_OUTPUT
            echo "ERROR_DETAILS=No test results file found" >> $GITHUB_OUTPUT
            echo "FAILED_TESTS_SUMMARY=No test results file found" >> $GITHUB_OUTPUT
            echo "FAILED_FILES=" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            test-results.json
          retention-days: 7

      - name: Deploy report to OVH server
        if: always()
        env:
          OVH_SSH_KEY: ${{ secrets.OVH_SSH_KEY }}
        run: |
          if [ -z "$OVH_SSH_KEY" ]; then
            echo "OVH_SSH_KEY is not configured; skipping report deployment."
            exit 0
          fi

          if [ ! -d playwright-report ]; then
            echo "playwright-report directory not found; skipping report deployment."
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$OVH_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 57.130.47.254 >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 ubuntu@57.130.47.254 "mkdir -p /var/www/e2e-reports/${{ github.run_id }}"
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" --delete ./playwright-report/ ubuntu@57.130.47.254:/var/www/e2e-reports/${{ github.run_id }}/

      - name: Build Slack success payload
        if: always() && steps.e2e-tests.outcome == 'success'
        id: slack-success-payload
        env:
          TEST_LIST: ${{ steps.parse-results.outputs.TEST_LIST }}
          PASSED: ${{ steps.parse-results.outputs.PASSED }}
          FLAKY: ${{ steps.parse-results.outputs.FLAKY }}
          SKIPPED: ${{ steps.parse-results.outputs.SKIPPED }}
          PR_NUMBER: ${{ steps.preview-context.outputs.pr_number }}
          PR_TITLE: ${{ steps.preview-context.outputs.pr_title }}
          BRANCH: ${{ steps.preview-context.outputs.head_ref }}
          AUTHOR: ${{ github.actor }}
          PREVIEW_URL: ${{ steps.preview-context.outputs.preview_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_URL: http://57.130.47.254:8080/${{ github.run_id }}/
        run: |
          jq -n \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg preview_url "$PREVIEW_URL" \
            --arg passed "$PASSED" \
            --arg flaky "$FLAKY" \
            --arg skipped "$SKIPPED" \
            --arg test_list "$TEST_LIST" \
            --arg run_url "$RUN_URL" \
            --arg report_url "$REPORT_URL" \
            '{
              "blocks": [
                {"type": "header", "text": {"type": "plain_text", "text": "✅ E2E Tests Passed", "emoji": true}},
                {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": ("*PR:*\n#" + $pr_number + " " + $pr_title)},
                  {"type": "mrkdwn", "text": ("*Branch:*\n" + $branch)}
                ]},
                {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": ("*Author:*\n" + $author)},
                  {"type": "mrkdwn", "text": ("*Preview:*\n<" + $preview_url + "|Open preview>")}
                ]},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("*Results:* ✅ " + $passed + " passed | ⚠️ " + $flaky + " flaky | ⏭️ " + $skipped + " skipped")}},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("*Tests:*\n```" + $test_list + "```")}},
                {"type": "actions", "elements": [
                  {"type": "button", "text": {"type": "plain_text", "text": "View Run"}, "url": $run_url},
                  {"type": "button", "text": {"type": "plain_text", "text": "View Report"}, "url": $report_url},
                  {"type": "button", "text": {"type": "plain_text", "text": "Open Preview"}, "url": $preview_url}
                ]}
              ]
            }' > slack-success-payload.json

      - name: Notify Slack on Success
        if: always() && steps.e2e-tests.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: slack-success-payload.json

      - name: Build Slack failure payload
        if: always() && steps.e2e-tests.outcome == 'failure'
        id: slack-payload
        env:
          FAILED_SUMMARY: ${{ steps.parse-results.outputs.FAILED_TESTS_SUMMARY }}
          ERROR_DETAILS: ${{ steps.parse-results.outputs.ERROR_DETAILS }}
          FAILED_FILES: ${{ steps.parse-results.outputs.FAILED_FILES }}
          PASSED: ${{ steps.parse-results.outputs.PASSED }}
          FAILED: ${{ steps.parse-results.outputs.FAILED }}
          FLAKY: ${{ steps.parse-results.outputs.FLAKY }}
          SKIPPED: ${{ steps.parse-results.outputs.SKIPPED }}
          PR_NUMBER: ${{ steps.preview-context.outputs.pr_number }}
          PR_TITLE: ${{ steps.preview-context.outputs.pr_title }}
          BRANCH: ${{ steps.preview-context.outputs.head_ref }}
          AUTHOR: ${{ github.actor }}
          PREVIEW_URL: ${{ steps.preview-context.outputs.preview_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_URL: http://57.130.47.254:8080/${{ github.run_id }}/
        run: |
          # Build local run command against the same preview URL.
          LOCAL_CMD="PLAYWRIGHT_BASE_URL=${PREVIEW_URL} npx playwright test --ui ${FAILED_FILES}"

          # Clean ANSI codes from error details.
          CLEAN_ERRORS=$(echo "$ERROR_DETAILS" | sed 's/\x1b\[[0-9;]*m//g')

          # Use jq to build proper JSON with proper newlines.
          jq -n \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg preview_url "$PREVIEW_URL" \
            --arg passed "$PASSED" \
            --arg failed "$FAILED" \
            --arg flaky "$FLAKY" \
            --arg skipped "$SKIPPED" \
            --arg failed_summary "$FAILED_SUMMARY" \
            --arg error_details "$CLEAN_ERRORS" \
            --arg local_cmd "$LOCAL_CMD" \
            --arg run_url "$RUN_URL" \
            --arg report_url "$REPORT_URL" \
            '{
              "blocks": [
                {"type": "section", "text": {"type": "mrkdwn", "text": "<!here>"}},
                {"type": "header", "text": {"type": "plain_text", "text": "❌ E2E Tests Failed", "emoji": true}},
                {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": ("*PR:*\n#" + $pr_number + " " + $pr_title)},
                  {"type": "mrkdwn", "text": ("*Branch:*\n" + $branch)}
                ]},
                {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": ("*Author:*\n" + $author)},
                  {"type": "mrkdwn", "text": ("*Preview:*\n<" + $preview_url + "|Open preview>")}
                ]},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("*Résultats:* ✅ " + $passed + " | ❌ " + $failed + " | ⚠️ " + $flaky + " | ⏭️ " + $skipped)}},
                {"type": "divider"},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("📋 *Tests échoués:*\n" + $failed_summary)}},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("💻 *Lancer en local:*\n```" + $local_cmd + "```")}},
                {"type": "divider"},
                {"type": "section", "text": {"type": "mrkdwn", "text": ("🔍 *Erreurs:*\n```" + $error_details + "```")}},
                {"type": "actions", "elements": [
                  {"type": "button", "text": {"type": "plain_text", "text": "GitHub Actions"}, "url": $run_url},
                  {"type": "button", "text": {"type": "plain_text", "text": "Rapport HTML"}, "style": "danger", "url": $report_url},
                  {"type": "button", "text": {"type": "plain_text", "text": "Open Preview"}, "url": $preview_url}
                ]}
              ]
            }' > slack-payload.json

      - name: Notify Slack on Failure
        if: always() && steps.e2e-tests.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: slack-payload.json

      - name: Fail workflow on E2E failure
        if: always() && steps.e2e-tests.outcome == 'failure'
        run: exit 1
