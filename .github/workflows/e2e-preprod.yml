name: E2E Preprod

on:
  push:
    branches: [preprod]
  workflow_dispatch:

jobs:
  e2e:
    uses: ./.github/workflows/e2e-reusable.yml
    with:
      base_url: 'https://preprod.maydai.io'
      ref: ${{ github.sha }}
      use_bypass: true
      grep_tag: ''
      grep_invert: '@nightly-only'
      blocking: false
      regime_label: preprod
    secrets: inherit
