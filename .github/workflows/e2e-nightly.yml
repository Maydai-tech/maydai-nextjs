name: E2E Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  e2e:
    uses: ./.github/workflows/e2e-reusable.yml
    with:
      base_url: 'https://maydai.io'
      ref: 'main'
      use_bypass: false
      grep_tag: ''
      grep_invert: ''
      blocking: false
      regime_label: nightly
    secrets: inherit
